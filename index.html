<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basecamp Coffee Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0f172a] text-slate-100 flex items-center justify-center min-h-screen p-4 font-sans">

    <div class="w-full max-w-sm bg-[#1e293b] rounded-[2.5rem] p-8 shadow-2xl border border-slate-700/50">
        <h1 class="text-xl font-black mb-8 uppercase tracking-widest text-blue-400 italic text-center">Basecamp Control</h1>

        <div class="mb-8 p-6 bg-[#0f172a]/60 border border-slate-700 rounded-3xl text-center">
            <div class="flex items-center justify-center gap-3 mb-4 text-blue-400">
                <i data-lucide="tv"></i>
                <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Timer TV PlayStation</span>
            </div>
            
            <div id="display" class="text-6xl font-mono font-black text-yellow-500 mb-6">00:00</div>

            <div class="grid grid-cols-5 gap-2 mb-6">
                <button onclick="setTimer(60)" class="bg-slate-800 py-2 rounded-lg font-bold text-[9px] hover:bg-slate-700 border border-slate-700">1H</button>
                <button onclick="setTimer(120)" class="bg-slate-800 py-2 rounded-lg font-bold text-[9px] hover:bg-slate-700 border border-slate-700">2H</button>
                <button onclick="setTimer(180)" class="bg-slate-800 py-2 rounded-lg font-bold text-[9px] hover:bg-slate-700 border border-slate-700">3H</button>
                <button onclick="setTimer(240)" class="bg-slate-800 py-2 rounded-lg font-bold text-[9px] hover:bg-slate-700 border border-slate-700">4H</button>
                <button onclick="setTimer(300)" class="bg-slate-800 py-2 rounded-lg font-bold text-[9px] hover:bg-slate-700 border border-slate-700">5H</button>
                <button onclick="setTimer(360)" class="bg-slate-800 py-2 rounded-lg font-bold text-[9px] hover:bg-slate-700 border border-slate-700">6H</button>
                <button onclick="setTimer(420)" class="bg-slate-800 py-2 rounded-lg font-bold text-[9px] hover:bg-slate-700 border border-slate-700">7H</button>
                <button onclick="setTimer(480)" class="bg-slate-800 py-2 rounded-lg font-bold text-[9px] hover:bg-slate-700 border border-slate-700">8H</button>
                <button onclick="setTimer(540)" class="bg-slate-800 py-2 rounded-lg font-bold text-[9px] hover:bg-slate-700 border border-slate-700">9H</button>
                <button onclick="setTimer(600)" class="bg-slate-800 py-2 rounded-lg font-bold text-[9px] hover:bg-blue-900 border border-blue-500/30 text-blue-400">10H</button>
            </div>

            <button id="btn-tv" onclick="mulaiTV()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-sm uppercase tracking-widest active:scale-95 transition-all shadow-lg shadow-blue-900/40">Mulai Sewa</button>
        </div>

        <div class="p-6 bg-[#0f172a]/60 border border-slate-700 rounded-3xl">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-yellow-500/10 rounded-xl text-yellow-500"><i data-lucide="lightbulb"></i></div>
                    <div>
                        <p class="text-[10px] text-slate-500 uppercase font-bold font-mono">Penerangan</p>
                        <h2 class="font-bold text-base italic leading-none text-slate-200">4 LAMPU</h2>
                    </div>
                </div>
                <button onclick="toggleLampu()" id="btn-lampu" class="px-5 py-2 bg-slate-800 rounded-full font-black text-[10px] uppercase border border-slate-600 transition-all">OFF</button>
            </div>
        </div>

        <div class="mt-8 flex justify-between items-center px-2">
            <p class="text-[8px] text-slate-600 uppercase font-mono font-bold italic">Basecamp Coffee • ESP32</p>
            <button onclick="resetSemua()" class="text-[8px] text-red-500 uppercase font-bold hover:underline">Stop & Reset</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const token = "LEFHZSZHtuGUqimUSXVjg_0QKbdPDrFI";
        let detik = 0, running = false, timer, lampuOn = false;

        function blynk(pin, val) {
            fetch(`https://blynk.cloud/external/api/update?token=${token}&${pin}=${val}`);
        }

        // Timer Monitor TV (V1)
        function setTimer(m) { if(!running) { detik = m * 60; updateDisp(); } }
        
        function updateDisp() {
            let jam = Math.floor(detik / 3600);
            let m = Math.floor((detik % 3600) / 60);
            let s = detik % 60;
            if(jam > 0) {
                document.getElementById('display').innerText = `${jam}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                document.getElementById('display').className = "text-5xl font-mono font-black text-yellow-500 mb-6";
            } else {
                document.getElementById('display').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                document.getElementById('display').className = "text-6xl font-mono font-black text-yellow-500 mb-6";
            }
        }

        function mulaiTV() {
            if (detik <= 0 || running) return;
            running = true;
            blynk('v1', 1); // Panggil V1 untuk TV
            document.getElementById('btn-tv').innerText = "SEDANG JALAN";
            document.getElementById('btn-tv').className = "w-full bg-green-600/20 border border-green-500 text-green-400 py-4 rounded-2xl font-black text-sm uppercase tracking-widest";
            
            timer = setInterval(() => {
                if (detik > 0) { detik--; updateDisp(); }
                else { 
                    clearInterval(timer);
                    blynk('v1', 0); // Matikan V1
                    running = false;
                    document.getElementById('btn-tv').innerText = "MULAI SEWA";
                    document.getElementById('btn-tv').className = "w-full bg-blue-600 py-4 rounded-2xl font-black text-sm uppercase tracking-widest";
                    alert("Waktu Rental Selesai!");
                }
            }, 1000);
        }

        // Kontrol Lampu (V2)
        function toggleLampu() {
            lampuOn = !lampuOn;
            blynk('v2', lampuOn ? 1 : 0); // Panggil V2 untuk Lampu
            const btn = document.getElementById('btn-lampu');
            btn.innerText = lampuOn ? "ON" : "OFF";
            btn.className = lampuOn ? "px-5 py-2 bg-green-500/20 text-green-400 rounded-full font-black text-[10px] uppercase border border-green-500/50" : "px-5 py-2 bg-slate-800 rounded-full font-black text-[10px] uppercase border border-slate-600";
        }

        function resetSemua() {
            if(confirm("Hentikan sewa & matikan TV sekarang?")) {
                location.reload();
                blynk('v1', 0);
            }
        }
    </script>
</body>
</html>
