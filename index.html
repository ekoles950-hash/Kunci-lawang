<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Center - Basecamp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 flex flex-col items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md bg-slate-800 rounded-[2rem] p-8 border border-slate-700 shadow-2xl text-center">
        <h1 class="text-xl font-black mb-8 uppercase tracking-widest text-blue-400 italic">Basecamp Coffee</h1>

        <div class="grid grid-cols-1 gap-6">
            <button onclick="kontrolAlat('v2', 'status-tv')" class="group relative flex items-center justify-between p-6 bg-slate-900/50 border-2 border-slate-700 rounded-3xl hover:border-blue-500 transition-all active:scale-95">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-blue-500/10 rounded-2xl text-blue-500"><i data-lucide="tv"></i></div>
                    <div class="text-left"><p class="text-[10px] text-slate-500 uppercase">Power Rental</p><h2 class="font-bold text-lg">TV & PS</h2></div>
                </div>
                <span id="status-tv" class="text-[10px] font-bold px-3 py-1 rounded-full bg-slate-800 text-slate-500">OFF</span>
            </button>

            <button onclick="kontrolAlat('v3', 'status-lampu')" class="group relative flex items-center justify-between p-6 bg-slate-900/50 border-2 border-slate-700 rounded-3xl hover:border-yellow-500 transition-all active:scale-95">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-yellow-500/10 rounded-2xl text-yellow-500"><i data-lucide="lightbulb"></i></div>
                    <div class="text-left"><p class="text-[10px] text-slate-500 uppercase">Penerangan</p><h2 class="font-bold text-lg">4 LAMPU</h2></div>
                </div>
                <span id="status-lampu" class="text-[10px] font-bold px-3 py-1 rounded-full bg-slate-800 text-slate-500">OFF</span>
            </button>
        </div>
        
        <p class="mt-8 text-[9px] text-slate-600 uppercase font-mono italic">Smart System by Ekolestiyo</p>
    </div>

    <script>
        lucide.createIcons();
        const blynkToken = "LEFHZSZHtuGUqimUSXVjg_0QKbdPDrFI";
        let status = { v2: 0, v3: 0 };

        function kontrolAlat(pin, elementId) {
            status[pin] = status[pin] === 0 ? 1 : 0;
            const label = document.getElementById(elementId);
            label.innerText = "WAIT...";
            
            fetch(`https://blynk.cloud/external/api/update?token=${blynkToken}&${pin}=${status[pin]}`)
                .then(() => {
                    label.innerText = status[pin] ? "ON" : "OFF";
                    label.className = status[pin] ? "text-[10px] font-bold px-3 py-1 rounded-full bg-green-500/20 text-green-400" : "text-[10px] font-bold px-3 py-1 rounded-full bg-slate-800 text-slate-500";
                });
        }
    </script>
</body>
</html>
