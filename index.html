<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 pb-24 font-sans">

    <nav class="bg-green-600 p-4 text-white sticky top-0 z-50 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold italic">🛵 GRAB NDESO</h1>
        <button onclick="tanyaStatus()" class="text-[10px] bg-white text-green-600 px-3 py-1 rounded-full font-bold shadow">CEK STATUS</button>
    </nav>

    <div id="main-content" class="container mx-auto p-4 max-w-md">
        <div class="bg-yellow-50 border-l-4 border-yellow-400 p-3 mb-6 rounded-r-xl">
            <p class="text-[10px] text-yellow-700 font-bold uppercase tracking-wider">Status: Driver Siaga di Pangkalan</p>
        </div>

        <h2 class="font-bold text-gray-700 mb-4 flex items-center">🔥 Menu Enak Hari Ini:</h2>
        
        <div id="daftar-menu" class="grid grid-cols-2 gap-4">
            <div class="bg-gray-200 animate-pulse h-48 rounded-2xl"></div>
            <div class="bg-gray-200 animate-pulse h-48 rounded-2xl"></div>
        </div>
    </div>

    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white p-4 shadow-[0_-5px_20px_rgba(0,0,0,0.15)] hidden z-50 rounded-t-3xl">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div>
                <p id="total-item" class="text-xs text-gray-500 font-bold">0 Item</p>
                <p id="total-harga" class="font-bold text-green-600 text-lg">Rp 0</p>
            </div>
            <button onclick="checkout()" class="bg-green-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-green-200 active:scale-95 transition">
                Pesan Sekarang
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let keranjang = [];

        // 1. Ambil Menu
        async function loadMenu() {
            const container = document.getElementById('daftar-menu');
            const { data } = await supabaseClient.from('menu_makanan').select('*').eq('stok_tersedia', true);
            if (data) {
                container.innerHTML = '';
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                            <img src="${item.foto_url || 'https://via.placeholder.com/300'}" class="w-full h-32 object-cover">
                            <div class="p-3 flex-grow flex flex-col justify-between">
                                <div>
                                    <h3 class="font-bold text-[13px] text-gray-800 leading-tight">${item.nama_makanan}</h3>
                                    <p class="text-green-600 font-black text-sm mt-1">Rp ${item.harga.toLocaleString('id-ID')}</p>
                                </div>
                                <button onclick="tambahKeKeranjang('${item.nama_makanan}', ${item.harga})" 
                                    class="w-full mt-3 border-2 border-green-500 text-green-600 py-1.5 rounded-xl text-[10px] font-bold active:bg-green-500 active:text-white transition">
                                    + KERANJANG
                                </button>
                            </div>
                        </div>`;
                });
            }
        }

        function tambahKeKeranjang(nama, harga) {
            keranjang.push({ nama, harga });
            updateCartUI();
        }

        function updateCartUI() {
            const bar = document.getElementById('cart-bar');
            if (keranjang.length > 0) {
                bar.classList.remove('hidden');
                const total = keranjang.reduce((sum, item) => sum + item.harga, 0);
                document.getElementById('total-harga').innerText = `Rp ${total.toLocaleString('id-ID')}`;
                document.getElementById('total-item').innerText = `${keranjang.length} Item terpilih`;
            }
        }

        // 2. Fungsi Tombol "Cek Status" (Biar user bisa cari pesanannya)
        function tanyaStatus() {
            const nama = prompt("Masukkan Nama saat memesan:");
            if (nama) cariPesanan(nama);
        }

        async function cariPesanan(nama) {
            const { data } = await supabaseClient
                .from('pesanan_ojek')
                .select('*')
                .ilike('nama_pembeli', `%${nama}%`)
                .order('created_at', { ascending: false })
                .limit(1);

            if (data && data.length > 0) {
                bukaHalamanTracking(data[0].id, data[0].status);
            } else {
                alert("Pesanan atas nama " + nama + " tidak ketemu lur!");
            }
        }

        // 3. Checkout
        async function checkout() {
            const nama = prompt("Nama Pembeli:");
            const alamat = prompt("Alamat Lengkap:");
            if (!nama || !alamat) return;

            const { data } = await supabaseClient
                .from('pesanan_ojek')
                .insert([{ nama_pembeli: nama, alamat_kirim: alamat, status: 'pending' }])
                .select();

            if (data) {
                bukaHalamanTracking(data[0].id, 'pending');
            }
        }

        // 4. HALAMAN TRACKING (MOTOR JALAN)
        function bukaHalamanTracking(id, statusAwal) {
            document.getElementById('main-content').innerHTML = `
                <div class="mt-10 bg-white p-8 rounded-3xl shadow-xl text-center border border-gray-100">
                    <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-12">Tracking Order</h2>
                    <div class="relative h-1.5 bg-gray-100 rounded-full mb-12 mx-4">
                        <div id="bar-progress" class="absolute top-0 left-0 h-full bg-green-500 rounded-full transition-all duration-1000" style="width:10%"></div>
                        <div id="motor" class="absolute -top-10 text-4xl transition-all duration-1000" style="left:0%">🛵</div>
                    </div>
                    <h3 id="txt-status" class="text-2xl font-black text-green-600 uppercase tracking-tight">${statusAwal}</h3>
                    <p id="txt-desc" class="text-sm text-gray-500 mt-2 px-4">Memulai koneksi ke Driver...</p>
                    <button onclick="window.location.reload()" class="mt-12 text-xs text-gray-400 font-bold hover:text-green-600 transition">← KEMBALI KE MENU</button>
                </div>
            `;
            document.getElementById('cart-bar').classList.add('hidden');
            updateUIRealtime(statusAwal);

            // Pantau perubahan dari Supabase
            supabaseClient
                .channel('tracking-' + id)
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'pesanan_ojek', filter: 'id=eq.'+id }, 
                (payload) => {
                    updateUIRealtime(payload.new.status);
                })
                .subscribe();
        }

        function updateUIRealtime(stat) {
            const motor = document.getElementById('motor');
            const bar = document.getElementById('bar-progress');
            const txt = document.getElementById('txt-status');
            const desc = document.getElementById('txt-desc');

            if (!motor) return;

            txt.innerText = stat.toUpperCase();
            if(stat === 'pending') { motor.style.left = '0%'; bar.style.width = '10%'; desc.innerText = "Pesananmu sudah masuk antrian bos."; }
            if(stat === 'proses') { motor.style.left = '40%'; bar.style.width = '45%'; desc.innerText = "Warung lagi sibuk nyiapin makananmu."; }
            if(stat === 'dikirim') { motor.style.left = '80%'; bar.style.width = '85%'; desc.innerText = "Driver sudah di jalan! Siapin duit pas lur."; motor.innerHTML = "🏍️💨"; }
            if(stat === 'selesai') { motor.style.left = '92%'; bar.style.width = '100%'; desc.innerText = "Pesanan sampai! Selamat makan!"; motor.innerHTML = "🏠"; }
        }

        loadMenu();
    </script>
</body>
</html>
