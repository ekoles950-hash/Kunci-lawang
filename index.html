<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Bakul Kampung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .cart-animation { animation: bounce 0.3s ease-in-out; }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body class="bg-gray-50 pb-24 font-sans">

    <nav class="bg-green-600 p-4 text-white sticky top-0 z-50 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold italic">🛵 GRAB NDESO</h1>
        <div class="text-xs bg-green-800 px-2 py-1 rounded">Online</div>
    </nav>

    <div class="container mx-auto p-4 max-w-md">
        <div class="bg-yellow-50 border-l-4 border-yellow-400 p-3 mb-6 rounded-r-xl">
            <p class="text-xs text-yellow-700 font-bold">Promo Ndeso: Makan enak, dompet aman!</p>
        </div>

        <h2 class="font-bold text-gray-700 mb-4 flex items-center">
            <span class="mr-2">🔥</span> Menu Spesial Hari Ini:
        </h2>
        
        <div id="daftar-menu" class="grid grid-cols-2 gap-4">
            <div class="bg-gray-200 animate-pulse h-48 rounded-2xl"></div>
            <div class="bg-gray-200 animate-pulse h-48 rounded-2xl"></div>
        </div>
    </div>

    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white p-4 shadow-[0_-5px_20px_rgba(0,0,0,0.15)] hidden z-50 rounded-t-3xl">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div id="cart-info" class="flex items-center">
                <div class="bg-green-100 p-2 rounded-lg mr-3 text-2xl">🛒</div>
                <div>
                    <p id="total-item" class="text-xs text-gray-500 font-bold">0 Item</p>
                    <p id="total-harga" class="font-bold text-green-600 text-lg">Rp 0</p>
                </div>
            </div>
            <button onclick="checkout()" class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-2xl font-bold transition-all active:scale-95 shadow-lg shadow-green-200">
                Pesan Sekarang
            </button>
        </div>
    </div>

    <script>
        // --- KONFIGURASI BOS ---
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let keranjang = [];

        // 1. Ambil Data Menu dari Supabase
        async function loadMenu() {
            const container = document.getElementById('daftar-menu');
            
            try {
                const { data, error } = await supabaseClient
                    .from('menu_makanan')
                    .select('*')
                    .eq('stok_tersedia', true);

                if (error) throw error;

                if (data && data.length > 0) {
                    container.innerHTML = '';
                    data.forEach(item => {
                        container.innerHTML += `
                            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 flex flex-col hover:shadow-md transition">
                                <div class="relative">
                                    <img src="${item.foto_url || 'https://via.placeholder.com/300?text=Menu+Ndeso'}" 
                                         class="w-full h-36 object-cover" 
                                         onerror="this.src='https://via.placeholder.com/300?text=Foto+Menyusul'">
                                    <span class="absolute top-2 right-2 bg-white/90 px-2 py-1 rounded-full text-[10px] font-bold text-green-600 shadow-sm">
                                        ${item.kategori || 'Menu'}
                                    </span>
                                </div>
                                <div class="p-3 flex-grow flex flex-col justify-between">
                                    <div>
                                        <h3 class="font-bold text-sm text-gray-800 line-clamp-2">${item.nama_makanan}</h3>
                                        <p class="text-green-600 font-black mt-1">Rp ${item.harga.toLocaleString('id-ID')}</p>
                                    </div>
                                    <button onclick="tambahKeKeranjang('${item.nama_makanan}', ${item.harga})" 
                                        class="w-full mt-3 bg-white border-2 border-green-500 text-green-600 py-2 rounded-xl text-[10px] font-bold hover:bg-green-500 hover:text-white transition-colors active:scale-90 uppercase tracking-wider">
                                        + Keranjang
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = '<p class="col-span-2 text-center text-gray-400 py-10">Belum ada menu, Bos. Isi dulu di Supabase!</p>';
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = '<p class="col-span-2 text-center text-red-400 py-10 text-xs">Gagal ambil data. Cek RLS Policy atau API Key Bos.</p>';
            }
        }

        // 2. Logika Keranjang
        function tambahKeKeranjang(nama, harga) {
            keranjang.push({ nama, harga });
            
            // Animasi kecil di bar keranjang
            const bar = document.getElementById('cart-bar');
            bar.classList.add('cart-animation');
            setTimeout(() => bar.classList.remove('cart-animation'), 300);
            
            updateCartUI();
        }

        function updateCartUI() {
            const bar = document.getElementById('cart-bar');
            const totalElement = document.getElementById('total-harga');
            const itemElement = document.getElementById('total-item');
            
            if (keranjang.length > 0) {
                bar.classList.remove('hidden');
                const total = keranjang.reduce((sum, item) => sum + item.harga, 0);
                totalElement.innerText = `Rp ${total.toLocaleString('id-ID')}`;
                itemElement.innerText = `${keranjang.length} Item terpilih`;
            } else {
                bar.classList.add('hidden');
            }
        }

        // 3. Fungsi Checkout (Kirim ke Tabel pesanan_ojek)
        async function checkout() {
            const nama = prompt("Nama Pembeli:");
            const alamat = prompt("Alamat Lengkap (RT/RW/No Rumah):");
            
            if (!nama || !alamat) {
                alert("Data harus lengkap ya Bos!");
                return;
            }

            const total = keranjang.reduce((sum, item) => sum + item.harga, 0);
            const detail = keranjang.map(i => i.nama).join(", ");

            const { data, error } = await supabaseClient
                .from('pesanan_ojek')
                .insert([
                    { 
                        nama_pembeli: nama, 
                        alamat_kirim: alamat, 
                        no_wa_pembeli: 'Input Manual',
                        status: 'pending'
                    }
                ]);

            if (error) {
                alert("Gagal kirim pesanan: " + error.message);
            } else {
                alert(`Sip, Pesanan Masuk!\nTotal: Rp ${total.toLocaleString('id-ID')}\nSabar ya ${nama}, driver segera meluncur!`);
                keranjang = [];
                updateCartUI();
            }
        }

        // Mulai jalankan
        loadMenu();
    </script>
</body>
</html>
