<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLock Pro - Basecamp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 flex flex-col items-center justify-center min-h-screen p-4 font-sans">

    <div class="w-full max-w-md bg-slate-800 rounded-3xl p-8 border border-slate-700 shadow-2xl text-center">
        <div class="flex items-center justify-center gap-2 mb-8">
            <div class="p-2 bg-blue-600 rounded-lg">
                <i data-lucide="shield-check" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">SmartLock Pro</h1>
        </div>

        <div id="status-card" class="mb-8 p-6 bg-slate-700/50 rounded-2xl border border-slate-600 transition-all">
            <div id="icon-container" class="flex justify-center mb-4">
                <i id="lock-icon" data-lucide="lock" class="w-16 h-16 text-slate-400"></i>
            </div>
            <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Status Pintu</p>
            <h2 id="status-text" class="text-2xl font-black text-slate-100 italic">SIAP...</h2>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="kontrolPintu(0)" class="flex flex-col items-center justify-center gap-3 p-6 bg-slate-800 border-2 border-green-500/50 rounded-2xl hover:bg-green-500/10 hover:border-green-500 text-green-400 transition-all active:scale-95">
                <i data-lucide="unlock" class="w-6 h-6"></i>
                <span class="font-bold">BUKA</span>
            </button>

            <button onclick="kontrolPintu(1)" class="flex flex-col items-center justify-center gap-3 p-6 bg-slate-800 border-2 border-red-500/50 rounded-2xl hover:bg-red-500/10 hover:border-red-500 text-red-400 transition-all active:scale-95">
                <i data-lucide="lock" class="w-6 h-6"></i>
                <span class="font-bold">KUNCI</span>
            </button>
        </div>

        <p class="mt-8 text-[10px] text-slate-500 uppercase tracking-tighter">Terkoneksi ke: NodeMCU-772x • Blynk Cloud</p>
    </div>

    <script>
        // Inisialisasi Icon
        lucide.createIcons();

        // TOKEN MILIK MAS EKO
        const blynkToken = "LEFHZSZHtuGUqimUSXVjg_0QKbdPDrFI";

        function kontrolPintu(nilai) {
            const statusText = document.getElementById('status-text');
            const icon = document.getElementById('lock-icon');
            const card = document.getElementById('status-card');

            statusText.innerText = "PROSES...";
            statusText.className = "text-2xl font-black text-yellow-500 animate-pulse italic";

            // Memanggil API Blynk
            const url = `https://blynk.cloud/external/api/update?token=${blynkToken}&v1=${nilai}`;

            fetch(url)
                .then(response => {
                    if (nilai === 0) {
                        statusText.innerText = "TERBUKA";
                        statusText.className = "text-2xl font-black text-green-400 italic";
                        icon.setAttribute('data-lucide', 'unlock');
                        card.className = "mb-8 p-6 bg-green-900/20 rounded-2xl border border-green-500/30 transition-all";
                    } else {
                        statusText.innerText = "TERKUNCI";
                        statusText.className = "text-2xl font-black text-slate-100 italic";
                        icon.setAttribute('data-lucide', 'lock');
                        card.className = "mb-8 p-6 bg-slate-700/50 rounded-2xl border border-slate-600 transition-all";
                    }
                    lucide.createIcons(); // Refresh icon
                })
                .catch(err => {
                    statusText.innerText = "ERROR!";
                    statusText.className = "text-2xl font-black text-red-500 italic";
                    console.error("Gagal konek:", err);
                });
        }
    </script>
</body>
</html>
