<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Bakul Kampung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 pb-24">

    <nav class="bg-green-600 p-4 text-white sticky top-0 z-50 shadow-md">
        <h1 class="text-xl font-bold italic text-center">🛵 GRAB NDESO</h1>
    </nav>

    <div class="container mx-auto p-4 max-w-md">
        <h2 class="font-bold text-gray-700 mb-4">Pilih Menu Enak:</h2>
        
        <div id="daftar-menu" class="grid grid-cols-2 gap-4">
            <div class="animate-pulse bg-gray-200 h-40 rounded-xl"></div>
            <div class="animate-pulse bg-gray-200 h-40 rounded-xl"></div>
        </div>
    </div>

    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.1)] hidden z-50">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div>
                <p class="text-xs text-gray-500">Total Pesanan:</p>
                <p id="total-harga" class="font-bold text-green-600">Rp 0</p>
            </div>
            <button onclick="checkout()" class="bg-green-600 text-white px-6 py-2 rounded-full font-bold">
                Beli Sekarang
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'MASUKKAN_ANON_KEY_KAMU'; // ISI LAGI DISINI BOS
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let keranjang = [];

        async function loadMenu() {
            const { data, error } = await supabaseClient.from('menu_makanan').select('*');
            const container = document.getElementById('daftar-menu');
            
            if (data) {
                container.innerHTML = '';
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                            <img src="${item.foto_url || 'https://via.placeholder.com/150?text=No+Image'}" class="w-full h-32 object-cover">
                            <div class="p-3">
                                <h3 class="font-bold text-sm h-10 overflow-hidden text-gray-800">${item.nama_makanan}</h3>
                                <p class="text-green-600 font-bold mt-1">Rp ${item.harga.toLocaleString()}</p>
                                <button onclick="tambahKeKeranjang('${item.nama_makanan}', ${item.harga})" 
                                    class="w-full mt-3 border-2 border-green-500 text-green-600 py-1 rounded-lg text-xs font-bold hover:bg-green-50">
                                    + Keranjang
                                </button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        function tambahKeKeranjang(nama, harga) {
            keranjang.push({ nama, harga });
            updateCartUI();
        }

        function updateCartUI() {
            const bar = document.getElementById('cart-bar');
            const totalElement = document.getElementById('total-harga');
            
            if (keranjang.length > 0) {
                bar.classList.remove('hidden');
                const total = keranjang.reduce((sum, item) => sum + item.harga, 0);
                totalElement.innerText = `Rp ${total.toLocaleString()} (${keranjang.length} item)`;
            }
        }

        async function checkout() {
            const nama = prompt("Nama Pembeli:");
            const alamat = prompt("Alamat Lengkap:");
            if (!nama || !alamat) return;

            const total = keranjang.reduce((sum, item) => sum + item.harga, 0);
            const detail = keranjang.map(i => i.nama).join(", ");

            const { data, error } = await supabaseClient.from('pesanan_ojek').insert([
                { nama_pembeli: nama, alamat_kirim: alamat, detail_pesanan: detail, total_bayar: total }
            ]);

            if (!error) {
                alert("Pesanan terkirim! Driver akan segera meluncur.");
                keranjang = [];
                document.getElementById('cart-bar').classList.add('hidden');
            }
        }

        loadMenu();
    </script>
</body>
</html>
