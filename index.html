<script>
    lucide.createIcons();
    
    // API Key/Auth Token Mas Eko yang terbaru
    const blynkToken = "LEFHZSZHtuGUqimUSXVjg_0QKbdPDrFI";

    function kontrolPintu(nilai) {
        const statusText = document.getElementById('status-text');
        const icon = document.getElementById('lock-icon');
        const card = document.getElementById('status-card');

        statusText.innerText = "MENGIRIM...";
        
        // Link ini otomatis akan nyambung ke Template TMPL6Vy4nmp2W via Token
        const url = `https://blynk.cloud/external/api/update?token=${blynkToken}&v1=${nilai}`;

        fetch(url).then(() => {
            if (nilai === 0) {
                statusText.innerText = "TERBUKA";
                statusText.className = "text-3xl font-black italic text-green-400";
                icon.setAttribute('data-lucide', 'unlock');
                card.className = "mb-8 p-8 rounded-3xl border bg-green-900/10 border-green-500/30 transition-all duration-500";
            } else {
                statusText.innerText = "TERKUNCI";
                statusText.className = "text-3xl font-black italic text-slate-100";
                icon.setAttribute('data-lucide', 'lock');
                card.className = "mb-8 p-8 rounded-3xl border bg-slate-700/30 border-slate-600 transition-all duration-500";
            }
            lucide.createIcons();
        }).catch(err => {
            statusText.innerText = "OFFLINE";
            console.error("Gagal konek ke Blynk:", err);
        });
    }
</script>
